<!DOCTYPE html>

<html>
<head>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@200..700&display=swap');
    </style>
    <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
    <title>Cadastrar</title>
    <link rel="stylesheet" href="style-cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <nav>
        <a href="index.html"><i class="bi bi-house-door-fill"></i></a>
    </nav>
    <div class="container-geral">
        <div class="container-login">
            <h2>Cadastre-se com email</h2>
            <form id="formCadastro">
                <div class="card-input">
                    <h5>Email</h5>
                    <input type="email" id="emailCadastro" placeholder="insira um email">
                    <h5>Senha</h5>
                    <input type="password" id="senhaCadastro" placeholder="insira a senha">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
    
        </div>
    </div>

    <script type="module" src="arch.js"></script>

</body>

</html>

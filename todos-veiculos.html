<!DOCTYPE html>

<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@200..700&display=swap');
    </style>
    <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
    <title>Todos os carros</title>
    <link rel="stylesheet" href="style-veiculos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <div class="card-homebtn">
            <a href="index.html"><button>Voltar</button></a>
        </div>
        <div class="card-titulo">
            <h2 id="titulopagina">Todos os veículos - Carros</h2>
        </div>
        <div class="card-logo">
            <img src="logo.preto.bg.png">
        </div>
    </header>

    <main>
        <div class="container-filtros">
            <div class="card-filtro2">
                <div class="card-secao">
                    <p>Ano</p>
                </div>
                <label class="label-2">Selecione uma faixa de lançamento</label>
                <div class="card-select">
                    <select name="filtro-2">
                        <option value="">Todos valores</option>
                        <option value="2026-2022">2026 - 2022</option>
                        <option value="2022-2018">2022 - 2018</option>
                        <option value="2018-2014">2018 - 2014</option>
                        <option value="2014-2010">2014 - 2010</option>
                    </select>
                </div>
            </div>
            <div class="card-filtro3">
                <div class="card-secao">
                    <p>Preço</p>
                </div>
                <label class="label-2">Selecione uma faixa de preço</label>
                <div class="card-select">
                    <select name="filtro-2">
                        <option value="">Todos valores</option>
                        <option value="0-60000">Até 60.000</option>
                        <option value="60000-90000">60.000 - 90.000</option>
                        <option value="90000-130000">90.000 - 130.000</option>
                        <option value="130000+">130.000 +</option>
                    </select>
                </div>
            </div>
            <div class="card-filtro4" id="filtroKm">
                <div class="card-secao">
                    <p>Quilometragem</p>
                </div>
                <label class="label-2">Todos valores</label>
                <div class="card-select">
                    <select name="filtro-3">
                        <option value="">Todos valores</option>
                        <option value="0">0km</option>
                        <option value="0-40000">Até 40.000km</option>
                        <option value="40000-70000">40.000km - 70.000km</option>
                        <option value="70000+">70.000km +</option>
                    </select>
                </div>
            </div>
            <div class="card-filtro5">
                <div class="card-secao">
                    <p>Combustivel</p>
                </div>
                <label class="label-2">Selecione um tipo de combustivel</label>
                <div class="card-select">
                    <select name="filtro-5">
                        <option value="">Todos valores</option>
                        <option value="gasolina">Gasolina</option>
                        <option value="flex">Flex</option>
                        <option value="diesel">Diesel</option>
                        <option value="eletrico">Elétrico</option>
                    </select>
                </div>
                    
            </div>

            <div class="filtro-btn">
                <button class="filtrar-btn" id="btnFiltrar">Filtrar</button>
                <button class="limpar-filtro-btn" id="btnLimpar">Limpar filtros</button>
            </div>
        </div>

        <div id="lista-veiculos"></div>

        <p id="semVeiculos"></p>
        
    </main>

    <script type="module" src="arch.js"></script>

</body>

</html>
